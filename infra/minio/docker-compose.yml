services:
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: bs-lab-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./_data:/data

  mc-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: bs-lab-minio-mc-init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-bs-media}
      MEDIA_APP_ACCESS_KEY: ${MEDIA_APP_ACCESS_KEY:-media-app}
      MEDIA_APP_SECRET_KEY: ${MEDIA_APP_SECRET_KEY:-media-app-secret-please-change}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:3000}
    volumes:
      - ./init:/init:ro
    entrypoint: ["/bin/sh", "/init/init.sh"]
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    container_name: bs-lab-minio-nginx
    depends_on:
      - minio
    ports:
      - "8088:8088"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./_cache/nginx:/var/cache/nginx

