version: "3.8"

# 可选：LangGraph Checkpointer — PostgreSQL
# 不启动此服务不影响开发运行（会自动降级为 MemorySaver）
# 生产环境推荐启用以获得会话持久化能力
#
# 启动方式: docker compose -f docker-compose.yml up -d
# 环境变量: 设置 POSTGRES_PASSWORD 或使用默认值 changeme

services:
  postgres-agents:
    image: postgres:16-alpine
    container_name: bs-lab-agents-pg
    profiles: ["production"]  # 仅生产 profile 启动
    environment:
      POSTGRES_DB: bs_lab_agents
      POSTGRES_USER: bs_lab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_agents:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bs_lab -d bs_lab_agents"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata_agents:
